name: noble_invoice
description: "An all-in-one business toolkit app."
# Prevent accidental publishing to pub.dev.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

# Application dependencies.
dependencies:
  flutter:
    sdk: flutter

  # Core Packages for UI and State Management
  cupertino_icons: ^1.0.6
  flutter_contacts: ^1.1.9
  provider: ^6.1.2
  local_auth: ^2.3.0
  shared_preferences: ^2.2.3
  firebase_core: ^3.10.1
  firebase_messaging: ^15.2.1
  firebase_auth: ^5.5.1
  google_sign_in: ^6.2.1
  
  # Supabase Backend
  supabase_flutter: ^2.5.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # SVG Rendering for custom icons
  flutter_svg: ^2.0.10+1

  # QR Code Generation
  qr_flutter: ^4.1.0

  # QR Code Download & Permissions
  screenshot: ^3.0.0
  image_gallery_saver_plus: ^4.0.1
  permission_handler: ^11.3.1

  # Invoice & PDF Generation
  pdf: ^3.10.8
  printing: ^5.11.0 # Added for industry-standard PDF preview
  path: ^1.9.0
  path_provider: ^2.1.3 # To find the correct local path to save files.
  open_file: ^3.3.2 # To open the generated PDF invoice.

  # Social Features & Sharing
  share_plus: 12.0.1 # To share generated content like QR codes and invoices.
  image_picker: ^1.1.2 # To let users pick images for the QR generator.

  # Networking for AI Caption Generator & main API
  http: ^1.2.1
  dio: ^5.4.3+1

  # Secure JWT token storage on device
  flutter_secure_storage: ^9.0.0

  # Open browser links (legal pages, PayStack payment URL)
  url_launcher: ^6.3.0
  webview_flutter: ^4.10.0

  # Date / Number Formatting
  intl: ^0.19.0

  # Animations for Onboarding Screen
  animate_do: ^5.1.0
  flutter_native_splash: ^2.4.7

  uuid: ^4.5.3
  flutterwave_standard: ^1.1.0
  equatable: ^2.0.8
  flutter_staggered_animations: ^1.1.1

  # Charts (Revenue Analytics)
  fl_chart: ^0.68.0

  # File Picker (CRM Document Upload)
  file_picker: ^8.1.2
  image: ^4.8.0
  signature: ^6.3.0
  google_mlkit_text_recognition: ^0.14.0
  local_auth_android: any
  local_auth_darwin: any
  collection: ^1.19.1
  nfc_manager: ^4.1.1
  google_generative_ai: ^0.4.0
  speech_to_text: ^7.3.0
  geolocator: ^14.0.2
dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linter for code analysis.
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.9

# Flutter specific configurations
flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/images/templates/
    - assets/icons/
    - assets/fonts/

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/App icon.png"
  min_sdk_android: 21 # android@default:21

flutter_native_splash:
  color: "#2563EB"
  
  android_12:
    color: "#2563EB"

